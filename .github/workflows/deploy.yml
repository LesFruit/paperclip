name: Deploy Paperclip to Production

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      force_base_rebuild:
        description: 'Force base image rebuild'
        type: boolean
        default: false

env:
  SERVICE: paperclip
  DEPLOY_HOST: production-6
  DEPLOY_KEY: ~/.deploy-keys/production-6
  SSH_OPTS: -o StrictHostKeyChecking=no
  TAILSCALE_IP: '100.77.118.43'

jobs:
  deploy:
    runs-on: [self-hosted, tailscale-deploy]
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Detect deploy type
        id: detect
        run: |
          if [[ "${{ inputs.force_base_rebuild }}" == "true" ]]; then
            echo "type=full" >> $GITHUB_OUTPUT
            exit 0
          fi
          CHANGED=$(git diff --name-only HEAD~1 HEAD 2>/dev/null || echo "Dockerfile.base")
          if echo "$CHANGED" | grep -qE '^Dockerfile\.base$'; then
            echo "type=full" >> $GITHUB_OUTPUT
          else
            echo "type=code" >> $GITHUB_OUTPUT
          fi

      - name: Build base image (if needed)
        if: steps.detect.outputs.type == 'full'
        run: |
          # Transfer Dockerfile.base and build on production-6
          scp -i $DEPLOY_KEY $SSH_OPTS Dockerfile.base codex@$TAILSCALE_IP:/tmp/Dockerfile.base
          ssh -i $DEPLOY_KEY $SSH_OPTS codex@$TAILSCALE_IP \
            "podman build -t paperclip-base:latest -f /tmp/Dockerfile.base /tmp && rm /tmp/Dockerfile.base"

      - name: Install dependencies
        run: |
          [ -f "$HOME/.npmrc" ] && grep -q '^prefix=' "$HOME/.npmrc" && sed -i '/^prefix=/d' "$HOME/.npmrc"
          export NVM_DIR="$HOME/.nvm"
          [ -s "$NVM_DIR/nvm.sh" ] && . "$NVM_DIR/nvm.sh"
          pnpm install --frozen-lockfile

      - name: Build application
        run: |
          export NVM_DIR="$HOME/.nvm"
          [ -s "$NVM_DIR/nvm.sh" ] && . "$NVM_DIR/nvm.sh"
          pnpm --filter @paperclipai/ui build
          pnpm --filter @paperclipai/server build
          test -f server/dist/index.js || (echo "ERROR: server build output missing" && exit 1)

      - name: Package and deploy
        run: |
          SHA=$(echo ${{ github.sha }} | cut -c1-12)

          # Create tarball with built artifacts + node_modules
          tar czf /tmp/paperclip-${SHA}.tar.gz \
            --exclude='.git' \
            --exclude='.env' \
            --exclude='node_modules/.cache' \
            --exclude='docs' \
            --exclude='*.test.*' \
            --exclude='*.spec.*' \
            --exclude='media' \
            .

          # Transfer to production-6
          scp -i $DEPLOY_KEY $SSH_OPTS \
            /tmp/paperclip-${SHA}.tar.gz \
            codex@$TAILSCALE_IP:/tmp/

          # Deploy
          ssh -i $DEPLOY_KEY $SSH_OPTS codex@$TAILSCALE_IP \
            "~/deploy/scripts/deploy-code.sh paperclip ${SHA}"

          # Cleanup local tarball
          rm -f /tmp/paperclip-${SHA}.tar.gz

      - name: Health check
        run: |
          for i in $(seq 1 30); do
            if ssh -i $DEPLOY_KEY $SSH_OPTS codex@$TAILSCALE_IP \
              "curl -sf --max-time 5 'http://${TAILSCALE_IP}:3100/api/health'" > /dev/null 2>&1; then
              echo "Health check passed"
              exit 0
            fi
            echo "Waiting for service... ($i/30)"
            sleep 2
          done
          echo "Health check failed!"
          ssh -i $DEPLOY_KEY $SSH_OPTS codex@$TAILSCALE_IP "podman logs --tail 50 paperclip"
          exit 1

      - name: Install kimi-cli in container
        run: |
          # Build kimi-cli venv locally (main-dev-2 has internet access)
          export PATH="$HOME/.local/bin:$PATH"
          KIMI_VENV="$HOME/.local/share/uv/tools/kimi-cli"
          if [ ! -d "$KIMI_VENV" ]; then
            uv tool install --python 3.13 kimi-cli
          fi

          # Check if kimi is already in the container
          KIMI_OK=$(ssh -i $DEPLOY_KEY $SSH_OPTS codex@$TAILSCALE_IP \
            "podman exec paperclip kimi --version 2>/dev/null" || true)
          if [ -n "$KIMI_OK" ]; then
            echo "kimi-cli already installed in container: $KIMI_OK"
            exit 0
          fi
          echo "kimi-cli not found in container, installing..."

          # Transfer and install in running container
          tar czf /tmp/kimi-cli-venv.tar.gz -C "$(dirname $KIMI_VENV)" kimi-cli/
          scp -i $DEPLOY_KEY $SSH_OPTS /tmp/kimi-cli-venv.tar.gz codex@$TAILSCALE_IP:/tmp/
          ssh -i $DEPLOY_KEY $SSH_OPTS codex@$TAILSCALE_IP "
            podman cp /tmp/kimi-cli-venv.tar.gz paperclip:/tmp/
            podman exec --user root paperclip bash -c '
              mkdir -p /opt && cd /opt && tar xzf /tmp/kimi-cli-venv.tar.gz && rm -f /tmp/kimi-cli-venv.tar.gz
              ln -sf /usr/bin/python3 /opt/kimi-cli/bin/python
              for f in kimi kimi-cli; do
                [ -f /opt/kimi-cli/bin/\$f ] && sed -i \"1s|.*|#!/opt/kimi-cli/bin/python|\" /opt/kimi-cli/bin/\$f
              done
              sed -i \"s|home = .*|home = /usr/bin|\" /opt/kimi-cli/pyvenv.cfg
              ln -sf /opt/kimi-cli/bin/kimi /usr/local/bin/kimi
              ln -sf /opt/kimi-cli/bin/kimi-cli /usr/local/bin/kimi-cli
            '
            podman exec paperclip kimi --version
          "
          rm -f /tmp/kimi-cli-venv.tar.gz
