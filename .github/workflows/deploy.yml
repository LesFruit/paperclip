name: Deploy Paperclip to Production

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  deploy:
    uses: LesFruit/.github/.github/workflows/deploy-to-production.yml@main
    with:
      service: paperclip
      port_mapping: '100.77.118.43:3100:3100'
      health_url: 'http://100.77.118.43:3100/api/health'
      extra_volumes: '-v paperclip_data:/paperclip -v /home/codex/.codex/projects:/home/codex/.codex/projects:ro -v /home/codex/.codex/agent-ssh:/paperclip/.ssh:ro -v /home/codex/.local/bin/gh:/usr/local/bin/gh:ro'
